<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Topo Landscape Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #0f0; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; gap: 10px; padding: 0 10px; pointer-events: none;
        }

        .btn {
            padding: 12px 18px; border-radius: 8px; border: 1px solid #0f0;
            background: rgba(0, 40, 0, 0.8); color: #0f0; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 11px;
            box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }

        #snapBtn { background: rgba(0, 255, 0, 0.2); border-color: #0f0; }
        #resetBtn { border-color: #888; color: #888; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .stats { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 11; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #0f0; letter-spacing: 5px;">TOPO SCAN v2.5</h1>
        <p style="color: #888; margin: 20px; max-width: 280px;">Держите телефон горизонтально над землей. <br><br> Яркие участки станут горами, темные — низинами.</p>
        <button class="btn" onclick="initApp()">Начать сканирование</button>
    </div>

    <div class="stats" id="info">LANDSCAPE MODE: ACTIVE</div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <button id="snapBtn" class="btn">Захват ландшафта</button>
            <button id="viewBtn" class="btn">3D Осмотр</button>
            <button id="resetBtn" class="btn">Сброс</button>
        </div>
    </div>

    <canvas id="procCanvas" style="display:none;"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform sampler2D u_tex;
        uniform float u_depthScale;
        varying float v_y; // Используем Y для высоты в ландшафтном режиме

        void main() {
            vec4 color = texture2D(u_tex, uv);
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            
            vec3 pos = position;
            // В режиме ландшафта "вытягиваем" по оси Y (вверх)
            pos.y += brightness * u_depthScale;
            v_y = pos.y;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 2.5;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float v_y;
        void main() {
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            // Цвет зависит от высоты: чем выше, тем белее (как снег на пиках)
            // Чем ниже, тем зеленее (долины)
            vec3 lowColor = vec3(0.0, 0.5, 0.1);
            vec3 highColor = vec3(0.8, 1.0, 0.9);
            vec3 finalColor = mix(lowColor, highColor, v_y / 1.5);
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, video, videoTexture;
        let liveMesh, staticMesh;
        const GRID_RES = 160; 
        const DEPTH_SCALE = 1.8;

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            
            // Вид сверху под углом (изометрия)
            camera.position.set(0, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Сетка основания (как на топографических картах)
            const gridHelper = new THREE.GridHelper(10, 20, 0x004400, 0x002200);
            scene.add(gridHelper);

            setupCamera().then(() => {
                createLiveLandscape();
                setupUI();
                animate();
            });
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;
            videoTexture = new THREE.VideoTexture(video);
        }

        function createLiveLandscape() {
            // Плоскость лежит на земле (XZ), растет вверх (Y)
            const geo = new THREE.PlaneGeometry(8, 6, GRID_RES - 1, GRID_RES - 1);
            geo.rotateX(-Math.PI / 2); // Кладем на пол

            const mat = new THREE.ShaderMaterial({
                uniforms: { u_tex: { value: videoTexture }, u_depthScale: { value: DEPTH_SCALE } },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending
            });
            liveMesh = new THREE.Points(geo, mat);
            scene.add(liveMesh);
        }

        function setupUI() {
            const snapBtn = document.getElementById('snapBtn');
            const viewBtn = document.getElementById('viewBtn');
            const resBtn = document.getElementById('resetBtn');

            // Сброс всего
            resBtn.onclick = () => {
                if (staticMesh) { scene.remove(staticMesh); staticMesh = null; }
                liveMesh.visible = true;
                camera.position.set(0, 5, 5);
                controls.target.set(0, 0, 0);
                viewBtn.innerText = "3D Осмотр";
                viewBtn.style.background = "";
            };

            // Захват кадра (как в версии 2)
            snapBtn.onclick = () => {
                captureLandscape();
                alert("Ландшафт зафиксирован!");
            };

            // Переключение режимов
            viewBtn.onclick = () => {
                if (!staticMesh) return alert("Сначала сделайте захват!");
                liveMesh.visible = !liveMesh.visible;
                staticMesh.visible = !liveMesh.visible;
                viewBtn.innerText = liveMesh.visible ? "3D Осмотр" : "Вернуться к камере";
                viewBtn.style.background = liveMesh.visible ? "" : "#0f0";
                viewBtn.style.color = liveMesh.visible ? "" : "#000";
            };
        }

        function captureLandscape() {
            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = GRID_RES; canvas.height = GRID_RES;
            ctx.drawImage(video, 0, 0, GRID_RES, GRID_RES);
            const data = ctx.getImageData(0,0,GRID_RES,GRID_RES).data;

            if (staticMesh) scene.remove(staticMesh);

            const geo = new THREE.PlaneGeometry(8, 6, GRID_RES - 1, GRID_RES - 1);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            const colors = new Float32Array(pos.length);

            for (let i = 0; i < geo.attributes.position.count; i++) {
                const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
                const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
                
                // Вытягиваем высоту (Y)
                pos[i * 3 + 1] = lum * DEPTH_SCALE;

                // Цветовая карта высот для статики
                colors[i*3] = lum * 0.8; 
                colors[i*3+1] = lum + 0.2; 
                colors[i*3+2] = lum * 0.5;
            }

            const mat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true });
            staticMesh = new THREE.Points(geo, mat);
            staticMesh.visible = false;
            scene.add(staticMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
