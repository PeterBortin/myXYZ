<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luminance 3D Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #0f0; }
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* Скрытое видео, используем его как текстуру */
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; gap: 10px; pointer-events: none;
        }

        .btn {
            padding: 12px 20px; border-radius: 5px; border: 1px solid #0f0;
            background: rgba(0, 40, 0, 0.7); color: #0f0; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 11px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #0f0; margin-bottom: 20px;">LUMINANCE 3D</h1>
        <p style="color: #888; margin-bottom: 30px; max-width: 300px;">
            Создает 3D рельеф из частиц на основе светотени с камеры. <br><br>
            Вращайте модель одним пальцем, зум — двумя.
        </p>
        <button class="btn" onclick="initApp()">Начать</button>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <button id="resetBtn" class="btn">Сбросить камеру</button>
        </div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform sampler2D u_tex; // Текстура с камеры
        uniform float u_depthScale; // Сила выдавливания (Z)
        varying vec2 v_uv;
        varying float v_brightness;

        void main() {
            v_uv = uv;
            
            // Считываем цвет пикселя под этой точкой
            vec4 color = texture2D(u_tex, uv);
            
            // Вычисляем яркость по стандарту Luminance
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            v_brightness = brightness;

            // Вычисляем новую позицию. 
            // Z смещается вперед пропорционально яркости.
            vec3 newPosition = position;
            newPosition.z += brightness * u_depthScale;

            // Проекция точки на экран
            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            
            // Размер точки (делаем чуть крупнее для видимости)
            gl_PointSize = 3.0; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float v_brightness;

        void main() {
            // Рисуем точку как круг, а не квадрат
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            
            // Красим точку в зеленый, но яркость зависит от Z-смещения
            vec3 finalColor = vec3(0.0, 1.0, 0.2) * (0.3 + v_brightness * 0.7);
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, video, videoTexture, material;
        
        // Настройки сетки (оптимизировано для мобильных)
        // 256x256 = 65,536 точек в реальном времени.
        const GRID_WIDTH = 256; 
        const GRID_HEIGHT = 256; 
        const DEPTH_SCALE = 1.5; // Сила 3D эффекта

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Начальная позиция камеры чуть сбоку, чтобы сразу видеть 3D
            camera.position.set(1, 1, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('container').appendChild(renderer.domElement);

            // Орбитальное управление (пальцами)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Плавность вращения
            controls.target.set(0, 0, DEPTH_SCALE/2); // Фокус на центре рельефа

            // Сетка координат для понимания пространства
            const gridHelper = new THREE.GridHelper(4, 20, 0x004400, 0x002200);
            gridHelper.rotation.x = Math.PI / 2; // Кладем сетку горизонтально
            scene.add(gridHelper);

            setupCamera().then(() => {
                createPointCloud();
                animate();
            });

            document.getElementById('resetBtn').onclick = () => {
                camera.position.set(0, 0, 3);
                controls.target.set(0, 0, 0);
            };
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;

            // Создаем текстуру Three.js из видеопотока
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            videoTexture.format = THREE.RGBAFormat;
        }

        function createPointCloud() {
            // Создаем плоскость, состоящую из множества вершин
            const geometry = new THREE.PlaneGeometry(4, 3, GRID_WIDTH - 1, GRID_HEIGHT - 1);
            
            // Шейдерный материал (обработка на GPU)
            material = new THREE.ShaderMaterial({
                uniforms: {
                    u_tex: { value: videoTexture },
                    u_depthScale: { value: DEPTH_SCALE }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true,
                blending: THREE.AdditiveBlending, // Эффект свечения точек
                depthTest: false // Точки просвечивают друг сквозь друга для объема
            });

            // Превращаем плоскость в облако точек
            const pointCloud = new THREE.Points(geometry, material);
            scene.add(pointCloud);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update(); // Для плавного затухания OrbitControls
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
