<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo-Realistic 3D Snapshot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; gap: 10px; padding: 0 10px; pointer-events: none;
        }

        .btn {
            padding: 15px 25px; border-radius: 5px; border: 1px solid #fff;
            background: rgba(0, 0, 0, 0.8); color: #fff; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 12px;
            letter-spacing: 1px; transition: all 0.2s;
        }

        #snapBtn { background: #fff; color: #000; }
        #viewBtn { border-color: #0f0; color: #0f0; }
        #resetBtn { border-color: #888; color: #888; }
        
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .stats { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 11; font-size: 10px; text-transform: uppercase; color: #fff; opacity: 0.5;}
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 3px; margin-bottom: 20px;">3D PHOTO SNAPSHOT</h1>
        <p style="color: #888; margin-bottom: 30px; max-width: 280px; font-size: 14px;">
            Создает объемный слепок реальности на основе светотени. <br><br>
            Наведите на объект (лицо или рельеф) и нажмите SNAP.
        </p>
        <button class="btn" onclick="initApp()">Запустить</button>
    </div>

    <div class="stats" id="info">STATUS: LIVE STREAM</div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <button id="snapBtn" class="btn">SNAP (Снимок)</button>
            <button id="viewBtn" class="btn" disabled>View (Осмотр)</button>
            <button id="resetBtn" class="btn">Сброс</button>
        </div>
    </div>

    <canvas id="procCanvas" style="display:none;"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform sampler2D u_tex;
        uniform float u_depthScale;
        varying vec2 v_uv;
        varying float v_bright;

        void main() {
            v_uv = uv; // Передаем UV координаты для текстуры
            
            // Считываем цвет пикселя с камеры
            vec4 color = texture2D(u_tex, uv);
            // Вычисляем яркость
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            v_bright = brightness;

            vec3 pos = position;
            
            // --- ЛОГИКА ВЫДАВЛИВАНИЯ (Shape from Shading) ---
            // Яркие участки (свет) выдавливаются НА КАМЕРУ (Z+)
            // Темные участки (тени) уходят НАЗАД (Z-)
            pos.z += (brightness - 0.5) * u_depthScale;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            
            // Размер точек для плотной заливки
            gl_PointSize = 4.0; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform sampler2D u_tex;
        varying vec2 v_uv;
        varying float v_bright;

        void main() {
            // Круглая форма точки
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            
            // Считываем реальный цвет из видеопотока по UV координатам
            vec4 texColor = texture2D(u_tex, v_uv);
            
            // Смешиваем реальный цвет с яркостью для усиления объема
            vec3 finalColor = texColor.rgb * (0.5 + v_bright * 0.5);
            
            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, video, videoTexture;
        let liveMesh, staticMesh;
        
        // ВЫСОКОЕ РАЗРЕШЕНИЕ ДЛЯ ПЛОТНОЙ ЗАЛИВКИ (как на фото)
        const GRID_RES = 350; 
        const DEPTH_SCALE = 2.0; // Сила объема

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            // Камера смотрит прямо на объект
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 4); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio); 
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            setupCamera().then(() => {
                createLiveView();
                setupUI();
                animate();
            });
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 } // HD камера для текстур
            });
            video.srcObject = stream;
            videoTexture = new THREE.VideoTexture(video);
            // Улучшаем фильтрацию текстур
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
        }

        function createLiveView() {
            // Создаем вертикальную плоскость перед камерой (как фотография)
            const geo = new THREE.PlaneGeometry(5, 3.5, GRID_RES - 1, GRID_RES - 1);

            const mat = new THREE.ShaderMaterial({
                uniforms: { u_tex: { value: videoTexture }, u_depthScale: { value: DEPTH_SCALE } },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: false, // Плотная заливка
                depthTest: true
            });
            liveMesh = new THREE.Points(geo, mat);
            scene.add(liveMesh);
        }

        function setupUI() {
            const snapBtn = document.getElementById('snapBtn');
            const viewBtn = document.getElementById('viewBtn');
            const resBtn = document.getElementById('resetBtn');

            resBtn.onclick = () => {
                if (staticMesh) { scene.remove(staticMesh); staticMesh = null; }
                liveMesh.visible = true;
                camera.position.set(0, 0, 4);
                controls.target.set(0, 0, 0);
                viewBtn.disabled = true;
                document.getElementById('info').innerText = "STATUS: LIVE STREAM";
            };

            snapBtn.onclick = () => {
                captureSnapshot();
                viewBtn.disabled = false;
                alert("3D Снимок готов! Нажмите View.");
            };

            viewBtn.onclick = () => {
                if (!staticMesh) return;
                liveMesh.visible = !liveMesh.visible;
                staticMesh.visible = !liveMesh.visible;
                viewBtn.innerText = liveMesh.visible ? "View" : "Live";
                document.getElementById('info').innerText = liveMesh.visible ? "STATUS: LIVE STREAM" : "STATUS: 3D SNAPSHOT";
                
                if (staticMesh.visible) {
                    // Разворачиваем камеру чуть сбоку, чтобы сразу видеть объем
                    camera.position.set(1.5, 0.5, 4);
                    controls.target.set(0, 0, 0);
                } else {
                    camera.position.set(0, 0, 4);
                    controls.target.set(0, 0, 0);
                }
            };
        }

        // Захват статики с реальной фото-текстурой
        function captureSnapshot() {
            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d');
            // Используем GRID_RES для текстуры, чтобы она совпадала с сеткой
            canvas.width = GRID_RES; canvas.height = GRID_RES;
            ctx.drawImage(video, 0, 0, GRID_RES, GRID_RES);
            const data = ctx.getImageData(0,0,GRID_RES,GRID_RES).data;

            if (staticMesh) scene.remove(staticMesh);

            const geo = new THREE.PlaneGeometry(5, 3.5, GRID_RES - 1, GRID_RES - 1);
            const pos = geo.attributes.position.array;
            const colors = new Float32Array(pos.length);

            // CPU ОБРАБОТКА (Медленнее, но точнее для статики)
            for (let i = 0; i < geo.attributes.position.count; i++) {
                const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
                const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
                
                // --- ЛОГИКА ВЫДАВЛИВАНИЯ НА CPU ---
                pos[i * 3 + 2] = (lum - 0.5) * DEPTH_SCALE;

                // --- НАЛОЖЕНИЕ РЕАЛЬНОГО ЦВЕТА ФОТО ---
                colors[i*3] = r / 255; 
                colors[i*3+1] = g / 255; 
                colors[i*3+2] = b / 255;
            }

            // PointsMaterial использует vertexColors для отображения фото-текстуры
            const mat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, depthTest: true });
            staticMesh = new THREE.Points(geo, mat);
            staticMesh.visible = false;
            scene.add(staticMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
