<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Topo Pro v2.8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: sans-serif; overflow: hidden; color: #0f0; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; gap: 10px; padding: 0 10px; pointer-events: none;
        }

        .btn {
            padding: 12px 18px; border-radius: 8px; border: 1px solid #fff;
            background: rgba(0, 0, 0, 0.8); color: #fff; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 11px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1); transition: all 0.2s;
        }

        #snapBtn { background: rgba(255, 255, 255, 0.1); border-color: #f0f; color: #f0f; box-shadow: 0 0 15px rgba(255,0,255,0.2); }
        #viewBtn { background: rgba(0, 255, 0, 0.1); border-color: #0f0; color: #0f0; }
        #resetBtn { border-color: #888; color: #888; background: rgba(0,0,0,0.5); }
        
        #snapBtn:active { transform: scale(0.95); background: #f0f; color: #fff; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .stats { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 11; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #fff; opacity: 0.5;}
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #fff; letter-spacing: 3px; margin-bottom: 20px;">TOPO PRO v2.8</h1>
        <p style="color: #888; margin-bottom: 30px; max-width: 280px; font-size: 14px;">
            <span style="color: #fff;">1. Scan:</span> Наведите на рельеф (лицо, ткань). <br><br>
            <span style="color: #fff;">2. Capture & View:</span> Зафиксируйте и осмотрите 3D ландшафт.
        </p>
        <button class="btn" onclick="initApp()">Погнали</button>
    </div>

    <div class="stats" id="info">STATUS: LIVE</div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <button id="snapBtn" class="btn">Захват</button>
            <button id="viewBtn" class="btn">View</button>
            <button id="resetBtn" class="btn">Сброс</button>
        </div>
    </div>

    <canvas id="procCanvas" style="display:none;"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform sampler2D u_tex;
        uniform float u_depthScale;
        uniform float u_time; // Небольшое мерцание
        varying float v_y; 
        varying float v_bright;

        void main() {
            vec4 color = texture2D(u_tex, uv);
            float brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            
            // Заставляем тени уходить глубже (нелинейная морфология)
            float powerBrightness = pow(brightness, 1.2);

            vec3 pos = position;
            pos.y += powerBrightness * u_depthScale;
            
            // Небольшая "жизнь" в точках
            pos.y += sin(u_time * 2.0 + position.x * 5.0) * 0.01;

            v_y = pos.y;
            v_bright = brightness;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            
            // Делаем точки адаптивными к разрешению (качественнее)
            gl_PointSize = (3.0 + brightness * 2.0) * (u_depthScale / 1.5); 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float v_y;
        varying float v_bright;

        void main() {
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            
            // Определяем цветовую гамму ландшафта на основе высоты (v_y)
            float h = v_y / 1.8; // Нормализуем высоту от 0 до 1

            vec3 finalColor;

            if (h < 0.1) {
                // Низины/Трансвиз (Вода/Тень)
                finalColor = mix(vec3(0.0, 0.0, 0.3), vec3(0.0, 0.3, 0.5), h / 0.1);
            } else if (h < 0.4) {
                // Равнины (Трава/Лес)
                finalColor = mix(vec3(0.0, 0.3, 0.0), vec3(0.1, 0.6, 0.2), (h - 0.1) / 0.3);
            } else if (h < 0.7) {
                // Предгорья (Песок/Скалы)
                finalColor = mix(vec3(0.5, 0.4, 0.1), vec3(0.8, 0.7, 0.4), (h - 0.4) / 0.3);
            } else {
                // Пики (Снег/Лёд)
                finalColor = mix(vec3(0.8, 0.7, 0.6), vec3(1.0, 1.0, 1.0), (h - 0.7) / 0.3);
            }

            // Добавляем яркость от светотени для объема
            finalColor *= (0.5 + v_bright * 0.5);
            
            gl_FragColor = vec4(finalColor, 0.9);
        }
    </script>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, video, videoTexture;
        let liveMesh, staticMesh, matUniforms;
        
        // --- УВЕЛИЧЕННОЕ РАЗРЕШЕНИЕ ---
        const GRID_RES = 300; 
        const DEPTH_SCALE = 1.8;
        const clock = new THREE.Clock();

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 5); // Вид сверху под углом

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Качественно, но без перегрева
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enablePan = true; // Разрешить перетаскивание ландшафта

            // Топографическая сетка основания
            const gridHelper = new THREE.GridHelper(10, 20, 0x111111, 0x222222);
            scene.add(gridHelper);

            setupCamera().then(() => {
                createLiveLandscape();
                setupUI();
                animate();
            });
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 640, height: 480 } 
            });
            video.srcObject = stream;
            videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
        }

        function createLiveLandscape() {
            const geo = new THREE.PlaneGeometry(8, 6, GRID_RES - 1, GRID_RES - 1);
            geo.rotateX(-Math.PI / 2); // Кладем на пол

            matUniforms = { 
                u_tex: { value: videoTexture }, 
                u_depthScale: { value: DEPTH_SCALE },
                u_time: { value: 0.0 }
            };

            const mat = new THREE.ShaderMaterial({
                uniforms: matUniforms,
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.NormalBlending, // Более плотный рендеринг
                depthTest: true
            });
            liveMesh = new THREE.Points(geo, mat);
            scene.add(liveMesh);
        }

        function setupUI() {
            const snapBtn = document.getElementById('snapBtn');
            const viewBtn = document.getElementById('viewBtn');
            const resBtn = document.getElementById('resetBtn');

            resBtn.onclick = () => {
                if (staticMesh) { scene.remove(staticMesh); staticMesh = null; }
                liveMesh.visible = true;
                camera.position.set(0, 5, 5);
                controls.target.set(0, 0, 0);
                viewBtn.innerText = "View";
                viewBtn.style.background = ""; viewBtn.style.color = "";
                document.getElementById('info').innerText = "STATUS: LIVE";
            };

            snapBtn.onclick = () => {
                captureLandscape();
                alert("Topo зафиксировано! Нажмите View.");
            };

            viewBtn.onclick = () => {
                if (!staticMesh) return alert("Сначала зафиксируйте!");
                liveMesh.visible = !liveMesh.visible;
                staticMesh.visible = !liveMesh.visible;
                viewBtn.innerText = liveMesh.visible ? "View" : "Вернуться";
                viewBtn.style.background = liveMesh.visible ? "" : "#0f0";
                viewBtn.style.color = liveMesh.visible ? "" : "#000";
                document.getElementById('info').innerText = liveMesh.visible ? "STATUS: LIVE" : "STATUS: CAPTURED";
            };
        }

        // Захват статики с высокой плотностью
        function captureLandscape() {
            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = GRID_RES; canvas.height = GRID_RES;
            ctx.drawImage(video, 0, 0, GRID_RES, GRID_RES);
            const data = ctx.getImageData(0,0,GRID_RES,GRID_RES).data;

            if (staticMesh) scene.remove(staticMesh);

            const geo = new THREE.PlaneGeometry(8, 6, GRID_RES - 1, GRID_RES - 1);
            geo.rotateX(-Math.PI / 2);
            const pos = geo.attributes.position.array;
            const colors = new Float32Array(pos.length);

            // CPU ОБРАБОТКА (Медленнее, но точнее для статики)
            for (let i = 0; i < geo.attributes.position.count; i++) {
                const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
                const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
                const powerLum = Math.pow(lum, 1.2);
                
                // Высота (Y)
                pos[i * 3 + 1] = powerLum * DEPTH_SCALE;

                // СТАБИЛЬНЫЙ ГРАДИЕНТ ЦВЕТА (аналогично шейдеру, но на CPU)
                let finalC = new THREE.Color();
                if (lum < 0.1) finalC.lerpColors(new THREE.Color(0x000033), new THREE.Color(0x004466), lum/0.1);
                else if (lum < 0.4) finalC.lerpColors(new THREE.Color(0x003300), new THREE.Color(0x118822), (lum-0.1)/0.3);
                else if (lum < 0.7) finalC.lerpColors(new THREE.Color(0x554411), new THREE.Color(0x887744), (lum-0.4)/0.3);
                else finalC.lerpColors(new THREE.Color(0x887766), new THREE.Color(0xffffff), (lum-0.7)/0.3);

                colors[i*3] = finalC.r * (0.6 + lum*0.4); 
                colors[i*3+1] = finalC.g * (0.6 + lum*0.4); 
                colors[i*3+2] = finalC.b * (0.6 + lum*0.4);
            }

            const mat = new THREE.PointsMaterial({ size: 0.035, vertexColors: true, blending: THREE.NormalBlending, depthTest: true });
            staticMesh = new THREE.Points(geo, mat);
            staticMesh.visible = false;
            scene.add(staticMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (matUniforms) matUniforms.u_time.value = clock.getElapsedTime();
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
