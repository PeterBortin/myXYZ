<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Scanner Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: sans-serif; overflow: hidden; color: #0f0; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; z-index: 1; pointer-events: none; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10; padding: 0 20px;
        }

        .btn {
            padding: 15px 25px; border-radius: 10px; border: 2px solid #0f0;
            background: rgba(0, 40, 0, 0.6); color: #0f0; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 12px;
        }

        #scanBtn { background: rgba(255, 0, 0, 0.3); border-color: #f00; color: #f00; }
        #scanBtn.active { background: #f00; color: #fff; box-shadow: 0 0 20px #f00; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .stats { position: absolute; top: 20px; left: 20px; z-index: 11; font-family: monospace; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>3D SCANNER 2.0</h1>
        <p style="margin: 20px; color: #888;">Наведите на предмет и зажмите REC.<br>Затем нажмите VIEW для вращения модели.</p>
        <button class="btn" onclick="initApp()">Запустить</button>
    </div>

    <div class="stats" id="info">POINTS: 0</div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <div id="scanBtn" class="btn">Запись (REC)</div>
            <div id="viewBtn" class="btn">Осмотр (VIEW)</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, pointCloud, video;
        let isScanning = false;
        let useGyro = true;
        let pointCount = 0;
        const MAX_POINTS = 100000;

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // Сетка пола для ориентира
            const grid = new THREE.GridHelper(10, 10, 0x004400, 0x002200);
            scene.add(grid);

            // Настройка управления (вращение пальцами)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enabled = false; // Выключено во время сканирования

            // Облако точек
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(MAX_POINTS * 3), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(MAX_POINTS * 3), 3));
            
            const material = new THREE.PointsMaterial({ 
                size: 0.05, // Точки стали крупнее
                vertexColors: true,
                sizeAttenuation: true // Точки уменьшаются вдалеке
            });

            pointCloud = new THREE.Points(geometry, material);
            scene.add(pointCloud);

            setupCamera();
            setupInteractions();
            animate();
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        }

        function setupInteractions() {
            const scanBtn = document.getElementById('scanBtn');
            const viewBtn = document.getElementById('viewBtn');

            // Логика кнопки REC
            scanBtn.ontouchstart = () => { isScanning = true; scanBtn.classList.add('active'); };
            scanBtn.ontouchend = () => { isScanning = false; scanBtn.classList.remove('active'); };

            // Переключение в режим просмотра (VIEW)
            viewBtn.onclick = () => {
                useGyro = !useGyro;
                controls.enabled = !useGyro;
                viewBtn.style.background = useGyro ? "" : "#0f0";
                viewBtn.style.color = useGyro ? "" : "#000";
                video.style.opacity = useGyro ? "0.2" : "0.05";
                
                if (!useGyro) {
                    alert("Режим просмотра: крутите модель пальцем!");
                }
            };

            window.addEventListener('deviceorientation', (e) => {
                if (!useGyro) return;
                const alpha = THREE.MathUtils.degToRad(e.alpha || 0);
                const beta = THREE.MathUtils.degToRad(e.beta || 0);
                const gamma = THREE.MathUtils.degToRad(e.gamma || 0);
                camera.rotation.set(beta, alpha, -gamma, 'YXZ');
            });
        }

        function addPoints() {
            if (pointCount >= MAX_POINTS) return;

            // Генерируем "луч" из центра камеры
            const distance = 1.5 + Math.random() * 0.1; 
            const vector = new THREE.Vector3(
                (Math.random() - 0.5) * 0.4, 
                (Math.random() - 0.5) * 0.4, 
                -distance
            );
            vector.applyQuaternion(camera.quaternion);
            vector.add(camera.position);

            const positions = pointCloud.geometry.attributes.position.array;
            const colors = pointCloud.geometry.attributes.color.array;

            positions[pointCount * 3] = vector.x;
            positions[pointCount * 3 + 1] = vector.y;
            positions[pointCount * 3 + 2] = vector.z;

            // Сделаем точки ярко-зелеными для видимости
            colors[pointCount * 3] = 0;
            colors[pointCount * 3 + 1] = 1;
            colors[pointCount * 3 + 2] = 0;

            pointCount++;
            pointCloud.geometry.attributes.position.needsUpdate = true;
            pointCloud.geometry.attributes.color.needsUpdate = true;
            document.getElementById('info').innerText = `POINTS: ${pointCount}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isScanning && useGyro) {
                for(let i=0; i<10; i++) addPoints();
            }
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
