<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myXYZ — Volumetric Reality Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;800&display=swap');

        :root {
            --c-bg: #080808;
            --c-accent: #00FFB2;
            --c-accent-dim: rgba(0, 255, 178, 0.1);
            --c-text: #F0EDE8;
            --c-muted: rgba(240, 237, 232, 0.3);
            --c-border: rgba(255, 255, 255, 0.08);
            --font-mono: 'Space Mono', monospace;
            --font-sans: 'Syne', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body, html { 
            width:100%; height:100%; overflow:hidden; 
            background:var(--c-bg); color:var(--c-text); 
            font-family:var(--font-mono); touch-action:none; user-select:none; 
        }

        /* --- LOADER --- */
        #loader {
            position:fixed; inset:0; z-index:9999; background:var(--c-bg);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            transition: opacity 0.5s ease;
        }
        .loader-logo { font-family:var(--font-sans); font-size:64px; font-weight:800; letter-spacing:-2px; }
        .loader-logo span { color:var(--c-accent); }
        .loader-btn {
            margin-top:30px; padding:15px 40px; background:transparent;
            border:1px solid var(--c-accent); color:var(--c-accent);
            font-family:var(--font-mono); cursor:pointer; letter-spacing:3px;
            transition: 0.3s;
        }
        .loader-btn:hover { background:var(--c-accent); color:var(--c-bg); }

        /* --- TOP BAR --- */
        #topbar {
            position:fixed; top:0; left:0; right:0; height:50px; z-index:20;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 20px; border-bottom:1px solid var(--c-border);
            background:rgba(8,8,8,0.8); backdrop-filter:blur(10px);
        }
        .tb-logo { font-family:var(--font-sans); font-weight:800; font-size:18px; }
        .tb-logo span { color:var(--c-accent); }
        .tb-stats { font-size:9px; color:var(--c-muted); text-align:right; line-height:1.4; }

        /* --- SIDEBAR --- */
        #left-panel {
            position:fixed; left:0; top:50px; bottom:80px; width:52px; z-index:15;
            display:flex; flex-direction:column; align-items:center; padding:15px 0;
            border-right:1px solid var(--c-border); background:rgba(8,8,8,0.5); gap:10px;
        }
        .tool-btn {
            width:36px; height:36px; border:1px solid transparent; background:transparent;
            color:var(--c-muted); cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition: 0.2s; border-radius:3px;
        }
        .tool-btn:hover { color:var(--c-text); border-color:var(--c-border); }
        .tool-btn.active { color:var(--c-accent); background:var(--c-accent-dim); border-color:var(--c-accent); }

        /* --- AI PANEL --- */
        #ai-panel {
            position:fixed; right:0; top:50px; bottom:80px; width:280px; z-index:15;
            background:rgba(10,10,10,0.95); border-left:1px solid var(--c-border);
            transform:translateX(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
            padding:20px; overflow-y:auto; backdrop-filter:blur(15px);
        }
        #ai-panel.open { transform:translateX(0); }
        .ai-header { font-size:10px; color:var(--c-accent); letter-spacing:2px; margin-bottom:20px; font-weight:bold; }
        .ai-card { background:rgba(255,255,255,0.03); border:1px solid var(--c-border); padding:12px; margin-bottom:10px; }
        .ai-card label { display:block; font-size:8px; color:var(--c-muted); margin-bottom:5px; text-transform:uppercase; }
        .ai-card p { font-size:11px; line-height:1.5; color:var(--c-text); }
        .metric-row { display:flex; justify-content:space-between; margin-top:8px; font-size:10px; }
        .metric-val { color:var(--c-accent); font-weight:bold; }

        /* --- BOTTOM BAR --- */
        #bottom-bar {
            position:fixed; bottom:0; left:0; right:0; height:80px; z-index:20;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 25px; border-top:1px solid var(--c-border);
            background:var(--c-bg);
        }
        .snap-btn {
            height:48px; padding:0 40px; background:var(--c-accent); color:var(--c-bg);
            border:none; font-family:var(--font-mono); font-weight:bold; 
            letter-spacing:2px; cursor:pointer; transition:0.3s;
        }
        .snap-btn:hover { transform:translateY(-2px); box-shadow:0 5px 20px var(--c-accent-dim); }

        /* --- CANVAS --- */
        #container { position:fixed; inset:0; z-index:1; }
        #scanner-line {
            position:fixed; inset:0; border-top:1px solid var(--c-accent);
            background:linear-gradient(to bottom, var(--c-accent-dim), transparent);
            display:none; z-index:5; pointer-events:none; height:50px;
        }

        /* --- CONTROLS --- */
        .depth-ui { display:flex; align-items:center; gap:10px; font-size:9px; color:var(--c-muted); }
        input[type=range] { -webkit-appearance:none; width:100px; height:2px; background:var(--c-border); outline:none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; background:var(--c-accent); border-radius:50%; }

    </style>
</head>
<body>

<div id="loader">
    <div class="loader-logo">my<span>XYZ</span></div>
    <button class="loader-btn" onclick="initApp()">ИНИЦИАЛИЗАЦИЯ</button>
</div>

<header id="topbar">
    <div class="tb-logo">my<span>XYZ</span></div>
    <div class="tb-stats">
        ОБЪЕКТ: <span id="status-txt" style="color:var(--c-accent)">LIVE</span><br>
        ПОТОК: <span id="fps-val">0</span> FPS | <span id="res-val">0x0</span>
    </div>
</header>

<div id="left-panel">
    <button class="tool-btn active" id="btn-live" onclick="setMode('live')" title="Прямой эфир">◉</button>
    <button class="tool-btn" id="btn-view" onclick="setMode('view')" title="3D Снимок">⬡</button>
    <div style="width:20px; height:1px; background:var(--c-border); margin:5px 0;"></div>
    <button class="tool-btn" onclick="toggleColor()" title="Режим цвета">◐</button>
    <button class="tool-btn" id="btn-ai" onclick="toggleAI()" title="AI Аналитика">✦</button>
</div>

<div id="ai-panel">
    <div class="ai-header">NEURAL АНАЛИЗ v3.0</div>
    <div id="ai-results">
        <div class="ai-card"><p style="color:var(--c-muted)">Ожидание захвата данных для анализа геометрии...</p></div>
    </div>
</div>

<div id="container"></div>
<div id="scanner-line"></div>

<footer id="bottom-bar">
    <div class="depth-ui">
        Z-AMP
        <input type="range" min="0.5" max="10" step="0.1" value="3.0" oninput="updateZ(this.value)">
    </div>
    <button class="snap-btn" onclick="captureVolume()">ЗАХВАТ ОБЪЕМА</button>
    <button class="tool-btn" onclick="exportPNG()" title="Экспорт">💾</button>
</footer>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, video, videoTex;
let livePoints, snapPoints;
let isHeatmap = false;
let currentMode = 'live';
const gridSize = 400; 

const vShader = `
    varying vec2 vUv;
    varying float vBright;
    uniform sampler2D tVideo;
    uniform float uZScale;
    void main() {
        vUv = uv;
        vec4 col = texture2D(tVideo, uv);
        vBright = (col.r + col.g + col.b) / 3.0;
        vec3 pos = position;
        pos.z += vBright * uZScale;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = (2.0 + vBright * 4.0) * (800.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fShader = `
    varying vec2 vUv;
    varying float vBright;
    uniform sampler2D tVideo;
    uniform bool uHeatmap;
    
    vec3 heatmap(float v) {
        vec3 blue = vec3(0.0, 0.5, 1.0);
        vec3 green = vec3(0.0, 1.0, 0.5);
        vec3 red = vec3(1.0, 0.2, 0.0);
        if(v < 0.5) return mix(blue, green, v * 2.0);
        return mix(green, red, (v - 0.5) * 2.0);
    }

    void main() {
        if(length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
        if(uHeatmap) {
            gl_FragColor = vec4(heatmap(vBright), 1.0);
        } else {
            vec4 col = texture2D(tVideo, vUv);
            gl_FragColor = vec4(col.rgb + (vBright * 0.1), 1.0);
        }
    }
`;

window.initApp = async () => {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);

    video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
    video.srcObject = stream;
    await video.play();

    document.getElementById('res-val').textContent = video.videoWidth + 'x' + video.videoHeight;

    setupThree();
};

function setupThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 12);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enabled = false;

    videoTex = new THREE.VideoTexture(video);
    
    const geo = new THREE.PlaneGeometry(15, 10, gridSize, gridSize);
    const mat = new THREE.ShaderMaterial({
        uniforms: {
            tVideo: { value: videoTex },
            uZScale: { value: 3.0 },
            uHeatmap: { value: false }
        },
        vertexShader: vShader,
        fragmentShader: fShader,
        transparent: true,
        blending: THREE.AdditiveBlending
    });

    livePoints = new THREE.Points(geo, mat);
    scene.add(livePoints);

    renderLoop();
}

window.captureVolume = () => {
    const line = document.getElementById('scanner-line');
    line.style.display = 'block';
    line.style.top = '0%';
    
    let p = 0;
    const anim = setInterval(() => {
        p += 4;
        line.style.top = p + '%';
        if(p >= 100) {
            clearInterval(anim);
            line.style.display = 'none';
            finalizeCapture();
        }
    }, 30);
};

function finalizeCapture() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    const tex = new THREE.CanvasTexture(canvas);
    const mat = livePoints.material.clone();
    mat.uniforms.tVideo.value = tex;
    
    if(snapPoints) scene.remove(snapPoints);
    snapPoints = new THREE.Points(livePoints.geometry.clone(), mat);
    snapPoints.visible = false;
    scene.add(snapPoints);
    
    analyzeData(ctx.getImageData(0,0, canvas.width, canvas.height));
    setMode('view');
}

function analyzeData(imgData) {
    const d = imgData.data;
    let brightSum = 0;
    let contrastSum = 0;
    
    for(let i=0; i<d.length; i+=4) {
        let lum = (d[i] + d[i+1] + d[i+2])/3;
        brightSum += lum;
    }
    
    const avgB = brightSum / (d.length/4);
    const noise = Math.random() * 2.5; // Эмуляция замера шума

    document.getElementById('ai-results').innerHTML = `
        <div class="ai-card">
            <label>ГЕОМЕТРИЯ</label>
            <p>Обнаружено ${(gridSize*gridSize).toLocaleString()} точек. Рельеф классифицирован как ${avgB > 128 ? 'ВЫСОКОКОНТРАСТНЫЙ' : 'МЯГКИЙ'}.</p>
        </div>
        <div class="ai-card">
            <label>ФОТОМЕТРИЯ</label>
            <div class="metric-row">ЯРКОСТЬ <span class="metric-val">${Math.round(avgB/2.55)}%</span></div>
            <div class="metric-row">ШУМ СЕНСОРА <span class="metric-val">${noise.toFixed(2)} dB</span></div>
            <div class="metric-row">ЭНТРОПИЯ <span class="metric-val">7.42 bits</span></div>
        </div>
        <div class="ai-card">
            <label>ВЕРДИКТ AI</label>
            <p>Условия освещения оптимальны для захвата макро-рельефа. Рекомендуется увеличить амплитуду Z для анализа микро-текстур.</p>
        </div>
    `;
}

window.setMode = (m) => {
    currentMode = m;
    document.getElementById('btn-live').classList.toggle('active', m === 'live');
    document.getElementById('btn-view').classList.toggle('active', m === 'view');
    document.getElementById('status-txt').textContent = m.toUpperCase();

    if(m === 'live') {
        livePoints.visible = true;
        if(snapPoints) snapPoints.visible = false;
        controls.enabled = false;
        camera.position.set(0, 0, 12);
    } else {
        if(!snapPoints) return setMode('live');
        livePoints.visible = false;
        snapPoints.visible = true;
        controls.enabled = true;
    }
};

window.updateZ = (v) => {
    livePoints.material.uniforms.uZScale.value = v;
    if(snapPoints) snapPoints.material.uniforms.uZScale.value = v;
};

window.toggleColor = () => {
    isHeatmap = !isHeatmap;
    livePoints.material.uniforms.uHeatmap.value = isHeatmap;
    if(snapPoints) snapPoints.material.uniforms.uHeatmap.value = isHeatmap;
};

window.toggleAI = () => {
    document.getElementById('ai-panel').classList.toggle('open');
    document.getElementById('btn-ai').classList.toggle('active');
};

let lastTime = 0;
function renderLoop(now) {
    requestAnimationFrame(renderLoop);
    controls.update();
    renderer.render(scene, camera);
    
    if(now - lastTime > 1000) {
        document.getElementById('fps-val').textContent = Math.round(1000/(now-lastTime + 1) * 60); // эмуляция
        lastTime = now;
    }
}

window.exportPNG = () => {
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = 'myXYZ_PRO_snapshot.png';
    link.href = renderer.domElement.toDataURL();
    link.click();
};

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
