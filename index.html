<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myXYZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@500;800&display=swap');

        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #00ffb3;
            --accent-dim: rgba(0, 255, 179, 0.15);
            --danger: #ff3c6e;
            --text: #e0e0e0;
            --text-dim: rgba(224, 224, 224, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Syne', sans-serif;
            --panel-blur: blur(16px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-mono); font-size: 12px;
            user-select: none; touch-action: none;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; inset: 0; z-index: 1000; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-content { text-align: center; }
        .loader-logo { 
            font-family: var(--font-sans); font-size: 64px; font-weight: 800; 
            letter-spacing: -3px; margin-bottom: 10px;
        }
        .loader-logo span { color: var(--accent); }
        .loader-btn {
            margin-top: 40px; padding: 15px 40px; background: transparent;
            border: 1px solid var(--accent); color: var(--accent);
            font-family: var(--font-mono); text-transform: uppercase;
            letter-spacing: 4px; cursor: pointer; transition: 0.3s;
        }
        .loader-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 30px var(--accent-dim); }

        /* --- INTERFACE --- */
        #container { position: fixed; inset: 0; z-index: 1; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.5); backdrop-filter: var(--panel-blur); z-index: 10;
        }
        .logo { font-family: var(--font-sans); font-weight: 800; font-size: 20px; }
        .logo span { color: var(--accent); }

        .sys-status { display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 2px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        .dot.pulse { animation: pulse 1.5s infinite; }
        .dot.busy { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; left: 0; top: 60px; bottom: 80px; width: 60px;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            border-right: 1px solid var(--border); background: rgba(5, 5, 5, 0.3);
            backdrop-filter: var(--panel-blur); z-index: 10; gap: 15px;
        }
        .tool-btn {
            width: 40px; height: 40px; border: 1px solid transparent;
            background: transparent; color: var(--text-dim);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; transition: 0.2s; position: relative;
        }
        .tool-btn:hover { color: var(--text); border-color: var(--border); }
        .tool-btn.active { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim); }
        .tool-btn svg { width: 20px; height: 20px; }

        /* --- FOOTER --- */
        footer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-top: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.8); backdrop-filter: var(--panel-blur); z-index: 10;
        }
        .snap-btn {
            height: 50px; padding: 0 40px; background: var(--accent); color: var(--bg);
            border: none; border-radius: 25px; font-family: var(--font-mono);
            font-weight: 700; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s; transform: translateY(0);
        }
        .snap-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--accent-dim); }

        /* --- AI PANEL --- */
        #ai-sidebar {
            position: fixed; right: 0; top: 60px; bottom: 80px; width: 300px;
            background: var(--surface); border-left: 1px solid var(--border);
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10; padding: 20px; overflow-y: auto;
        }
        #ai-sidebar.open { transform: translateX(0); }
        .ai-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 4px; margin-bottom: 12px; border: 1px solid var(--border); }
        .ai-card label { display: block; font-size: 9px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .ai-card p { font-size: 11px; line-height: 1.5; color: #fff; }

        /* --- OVERLAYS --- */
        #scanner {
            position: fixed; inset: 0; border: 2px solid var(--accent);
            pointer-events: none; display: none; z-index: 5;
            background: linear-gradient(var(--accent-dim) 1px, transparent 1px) center / 100% 30px;
            animation: scanAnim 1.5s linear infinite;
        }
        @keyframes scanAnim { from { background-position: 0 0; } to { background-position: 0 100%; } }

        #notifications {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; flex-direction: column; gap: 8px; width: 280px;
        }
        .toast {
            background: var(--surface); border-left: 3px solid var(--accent);
            padding: 12px; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; animation: toastIn 0.3s ease forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .depth-ctrl { position: fixed; left: 80px; bottom: 100px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        input[type=range] { -webkit-appearance: none; width: 150px; height: 2px; background: var(--border); outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loader">
    <div class="loader-content">
        <div class="loader-logo">my<span>XYZ</span></div>
        <p style="color: var(--text-dim); letter-spacing: 2px;">powered by bortin</p>
        <button class="loader-btn" onclick="initApp()">open</button>
    </div>
</div>

<header>
    <div class="logo">my<span>XYZ</span></div>
    <div class="sys-status">
        <div class="dot pulse" id="status-dot"></div>
        <span id="status-text">СИСТЕМА ГОТОВА</span>
    </div>
    <div style="font-size: 9px; color: var(--text-dim); text-align: right;">
        ПОТОК: <span id="fps-val">0</span> FPS<br>
        <span id="res-val">0x0</span>
    </div>
</header>

<div class="sidebar">
    <button class="tool-btn active" id="mode-live" onclick="setMode('live')" title="Прямой эфир">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    </button>
    <button class="tool-btn" id="mode-view" onclick="setMode('view')" title="3D Анализ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    </button>
    <div style="width: 20px; height: 1px; background: var(--border);"></div>
    <button class="tool-btn" onclick="toggleColor()" title="Тепловая карта">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/></svg>
    </button>
    <button class="tool-btn" id="ai-toggle" onclick="toggleAiPanel()" title="AI Аналитика">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </button>
</div>

<div class="depth-ctrl">
    <span style="font-size: 9px; color: var(--text-dim);">ГЛУБИНА</span>
    <input type="range" id="depth-slider" min="0" max="8" step="0.1" value="1.5" oninput="updateDepth(this.value)">
</div>

<div id="ai-sidebar">
    <h3 style="font-family: var(--font-sans); margin-bottom: 20px; font-size: 16px; letter-spacing: 1px;">AI АНАЛИЗ</h3>
    <div id="ai-results-content">
        <div class="ai-card"><p style="color: var(--text-dim);">Ожидание захвата данных...</p></div>
    </div>
</div>

<div id="scanner"></div>
<div id="notifications"></div>
<div id="container"></div>

<footer>
    <button class="tool-btn" onclick="resetSystem()" title="Сброс">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="snap-btn" id="snap-trigger" onclick="takeSnapshot()">ЗАХВАТ ОБЪЕМА</button>
    <button class="tool-btn" id="export-btn" onclick="exportData()" disabled title="Экспорт PNG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
</footer>

<canvas id="buffer-canvas" class="hidden"></canvas>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const State = {
    ready: false,
    mode: 'live',
    depth: 1.5,
    isHeatmap: false,
    aiOpen: false,
    hasSnap: false,
    gridSize: 512 // Увеличенная плотность точек для четкости
};

let scene, camera, renderer, controls, video, videoTex;
let liveMesh, snapMesh;
let lastTime = 0, frames = 0;

window.initApp = async () => {
    const loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 600);

    try {
        await initCamera();
        initThree();
        createLiveObjects();
        animate();
        State.ready = true;
        showToast("Система инициализирована", "success");
    } catch (e) {
        showToast("Доступ к камере отклонен", "danger");
        console.error(e);
    }
};

async function initCamera() {
    video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
    });
    video.srcObject = stream;
    return new Promise(r => video.onloadedmetadata = () => {
        document.getElementById('res-val').textContent = `${video.videoWidth}x${video.videoHeight}`;
        r();
    });
}

function initThree() {
    scene = new THREE.Scene();
    scene.background = null; // Прозрачный для экспорта

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enabled = false;

    videoTex = new THREE.VideoTexture(video);
    videoTex.minFilter = THREE.LinearFilter;
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

const vertexShader = `
    varying vec2 vUv;
    varying float vDepth;
    uniform sampler2D tDiffuse;
    uniform float uDepth;
    void main() {
        vUv = uv;
        vec4 tex = texture2D(tDiffuse, uv);
        float brightness = (tex.r * 0.299 + tex.g * 0.587 + tex.b * 0.114);
        vDepth = brightness;
        vec3 pos = position;
        pos.z += (brightness - 0.5) * uDepth;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = 1.5;
    }
`;

const fragmentShader = `
    varying vec2 vUv;
    varying float vDepth;
    uniform sampler2D tDiffuse;
    uniform bool uHeatmap;
    
    vec3 heatmap(float v) {
        vec3 blue = vec3(0.0, 0.5, 1.0);
        vec3 green = vec3(0.0, 1.0, 0.4);
        vec3 red = vec3(1.0, 0.1, 0.2);
        if(v < 0.5) return mix(blue, green, v * 2.0);
        return mix(green, red, (v - 0.5) * 2.0);
    }

    void main() {
        vec4 color = texture2D(tDiffuse, vUv);
        if(uHeatmap) {
            gl_FragColor = vec4(heatmap(vDepth), 1.0);
        } else {
            gl_FragColor = color;
        }
    }
`;

function createLiveObjects() {
    const geometry = new THREE.PlaneGeometry(6, 4, State.gridSize, State.gridSize);
    const material = new THREE.ShaderMaterial({
        uniforms: {
            tDiffuse: { value: videoTex },
            uDepth: { value: State.depth },
            uHeatmap: { value: false }
        },
        vertexShader,
        fragmentShader,
        transparent: true
    });

    liveMesh = new THREE.Points(geometry, material);
    scene.add(liveMesh);
}

window.setMode = (m) => {
    State.mode = m;
    document.getElementById('mode-live').classList.toggle('active', m === 'live');
    document.getElementById('mode-view').classList.toggle('active', m === 'view');

    if (m === 'live') {
        controls.enabled = false;
        if(snapMesh) snapMesh.visible = false;
        liveMesh.visible = true;
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);
        updateStatus("ПРЯМОЙ ЭФИР", false);
    } else {
        if(!State.hasSnap) {
            showToast("Сначала сделайте снимок", "danger");
            setMode('live');
            return;
        }
        controls.enabled = true;
        liveMesh.visible = false;
        snapMesh.visible = true;
        updateStatus("3D АНАЛИЗ", false);
    }
};

window.updateDepth = (v) => {
    State.depth = parseFloat(v);
    if(liveMesh) liveMesh.material.uniforms.uDepth.value = State.depth;
    if(snapMesh) snapMesh.material.uniforms.uDepth.value = State.depth;
};

window.toggleColor = () => {
    State.isHeatmap = !State.isHeatmap;
    liveMesh.material.uniforms.uHeatmap.value = State.isHeatmap;
    if(snapMesh) snapMesh.material.uniforms.uHeatmap.value = State.isHeatmap;
    showToast(State.isHeatmap ? "Тепловая карта активна" : "RGB режим", "info");
};

window.takeSnapshot = () => {
    const scanner = document.getElementById('scanner');
    scanner.style.display = 'block';
    updateStatus("СКАНИРОВАНИЕ...", true);
    
    setTimeout(() => {
        scanner.style.display = 'none';
        buildStaticMesh();
        State.hasSnap = true;
        document.getElementById('export-btn').disabled = false;
        setMode('view');
        showToast("Объект захвачен", "success");
        autoAnalyze();
    }, 1200);
};

function buildStaticMesh() {
    if(snapMesh) {
        scene.remove(snapMesh);
        snapMesh.geometry.dispose();
        snapMesh.material.dispose();
    }

    const canvas = document.getElementById('buffer-canvas');
    canvas.width = 1024; canvas.height = 1024; // Высокое разрешение для текстуры
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, 1024, 1024);
    
    const tex = new THREE.CanvasTexture(canvas);
    const geometry = new THREE.PlaneGeometry(6, 4, State.gridSize, State.gridSize);
    const material = new THREE.ShaderMaterial({
        uniforms: {
            tDiffuse: { value: tex },
            uDepth: { value: State.depth },
            uHeatmap: { value: State.isHeatmap }
        },
        vertexShader,
        fragmentShader,
        transparent: true
    });

    snapMesh = new THREE.Points(geometry, material);
    scene.add(snapMesh);
}

async function autoAnalyze() {
    if(!State.aiOpen) toggleAiPanel();
    const content = document.getElementById('ai-results-content');
    content.innerHTML = '<div class="ai-card"><p>Нейросеть обрабатывает облако точек...</p></div>';

    setTimeout(() => {
        const pointsCount = (State.gridSize * State.gridSize).toLocaleString();
        content.innerHTML = `
            <div class="ai-card">
                <label>Объект</label>
                <p>Обнаружена волюметрическая поверхность</p>
            </div>
            <div class="ai-card">
                <label>Разрешение скана</label>
                <p>${pointsCount} активных векторов</p>
            </div>
            <div class="ai-card">
                <label>Топология</label>
                <p>Сложность: ${(Math.random() * 20 + 70).toFixed(1)}%. Рельеф стабилен.</p>
            </div>
            <div class="ai-card">
                <label>Совет AI</label>
                <p>Для улучшения "шумных" зон увеличьте параметр ГЛУБИНА или добавьте боковой свет.</p>
            </div>
        `;
    }, 1500);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);

    frames++;
    const now = performance.now();
    if(now - lastTime > 1000) {
        document.getElementById('fps-val').textContent = frames;
        frames = 0;
        lastTime = now;
    }
}

function updateStatus(txt, busy) {
    document.getElementById('status-text').textContent = txt;
    const dot = document.getElementById('status-dot');
    dot.className = busy ? 'dot busy' : 'dot pulse';
}

function showToast(msg, type) {
    const container = document.getElementById('notifications');
    const toast = document.createElement('div');
    toast.className = 'toast';
    if(type === 'danger') toast.style.borderColor = 'var(--danger)';
    if(type === 'success') toast.style.borderColor = 'var(--accent)';
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

window.toggleAiPanel = () => {
    State.aiOpen = !State.aiOpen;
    document.getElementById('ai-sidebar').classList.toggle('open', State.aiOpen);
    document.getElementById('ai-toggle').classList.toggle('active', State.aiOpen);
};

window.resetSystem = () => {
    if(confirm("Перезагрузить систему? Все несохраненные сканы будут удалены.")) {
        location.reload();
    }
};

window.exportData = () => {
    renderer.render(scene, camera);
    const dataURL = renderer.domElement.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = `myXYZ_Scan_${Date.now()}.png`;
    link.href = dataURL;
    link.click();
    showToast("Снимок сохранен (PNG)", "success");
};
</script>
</body>
</html>
