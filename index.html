<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myXYZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Syne:wght@500;800&display=swap');

        :root {
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #00ffb3;
            --accent-dim: rgba(0, 255, 179, 0.15);
            --danger: #ff3c6e;
            --text: #e0e0e0;
            --text-dim: rgba(224, 224, 224, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg); color: var(--text); 
            font-family: var(--font-mono); font-size: 12px;
            user-select: none; touch-action: none;
        }

        /* --- UI ELEMENTS --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(20px); z-index: 100;
        }
        .logo { font-family: var(--font-sans); font-weight: 800; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .sidebar {
            position: fixed; left: 0; top: 60px; bottom: 80px; width: 64px;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            border-right: 1px solid var(--border); background: rgba(5, 5, 5, 0.5);
            backdrop-filter: blur(15px); z-index: 90; gap: 20px;
        }

        #ai-sidebar {
            position: fixed; right: 0; top: 60px; bottom: 80px; width: 320px;
            background: rgba(15, 15, 15, 0.9); border-left: 1px solid var(--border);
            transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 90; padding: 25px; overflow-y: auto; backdrop-filter: blur(20px);
        }
        #ai-sidebar.open { transform: translateX(0); }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-top: 1px solid var(--border);
            background: var(--bg); z-index: 100;
        }

        /* --- BUTTONS & INPUTS --- */
        .tool-btn {
            width: 44px; height: 44px; border: 1px solid transparent; background: transparent;
            color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; transition: 0.3s;
        }
        .tool-btn:hover { color: var(--accent); background: var(--accent-dim); }
        .tool-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
        
        .snap-btn {
            height: 54px; padding: 0 45px; background: var(--accent); color: var(--bg);
            border: none; border-radius: 4px; font-family: var(--font-mono); font-weight: 800;
            letter-spacing: 2px; cursor: pointer; transition: 0.4s;
        }
        .snap-btn:hover { box-shadow: 0 0 30px var(--accent-dim); transform: scale(1.02); }

        .ai-card { 
            background: rgba(255,255,255,0.02); padding: 16px; border-radius: 4px; 
            margin-bottom: 12px; border: 1px solid var(--border);
        }
        .ai-card label { display: block; font-size: 10px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
        .ai-card p { font-size: 12px; line-height: 1.6; color: #fff; }
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .metric-item { font-size: 10px; color: var(--text-dim); }
        .metric-item span { display: block; color: var(--accent); font-size: 13px; font-weight: 700; }

        #container { position: fixed; inset: 0; z-index: 1; }
        #scanner-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); box-shadow: 0 0 20px var(--accent);
            display: none; z-index: 200; pointer-events: none;
        }

        .loader-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay">
    <h1 class="logo" style="font-size: 60px; margin-bottom: 20px;">my<span>XYZ</span></h1>
    <button class="snap-btn" onclick="startSystem()">ЗАПУСК СИСТЕМЫ</button>
</div>

<header>
    <div class="logo">my<span>XYZ</span> <span>PRO</span></div>
    <div style="text-align: right;">
        <span id="fps-counter" style="color: var(--accent);">60</span> FPS | 
        <span id="point-count">160,000</span> ТОЧЕК
    </div>
</header>

<div class="sidebar">
    <button class="tool-btn active" id="btn-live" onclick="switchMode('live')">🎥</button>
    <button class="tool-btn" id="btn-view" onclick="switchMode('view')">🧊</button>
    <button class="tool-btn" onclick="toggleHeatmap()">🌈</button>
    <button class="tool-btn" id="btn-ai" onclick="toggleAI()">🧠</button>
</div>

<div id="ai-sidebar">
    <h2 style="font-family: var(--font-sans); margin-bottom: 20px; color: var(--accent);">АНАЛИТИКА КАДРА</h2>
    <div id="ai-content">
        <div class="ai-card"><p>Ожидание захвата данных...</p></div>
    </div>
</div>

<div id="container"></div>
<div id="scanner-line"></div>

<footer>
    <div style="width: 150px;">
        <input type="range" min="0.1" max="8" step="0.1" value="2.5" style="width: 100%" oninput="updateExtrusion(this.value)">
        <div style="font-size: 9px; margin-top: 5px; color: var(--text-dim);">АМПЛИТУДА Z</div>
    </div>
    <button class="snap-btn" onclick="performCapture()">ЗАХВАТ ОБЪЕМА</button>
    <button class="tool-btn" onclick="exportFrame()">💾</button>
</footer>

<canvas id="proc-canvas" style="display: none;"></canvas>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let scene, camera, renderer, controls, video, videoTex;
let points, snapPoints;
let isHeatmap = false;
let mode = 'live';
const gridSize = 400; // Увеличенное количество точек

const vertShader = `
    varying vec2 vUv;
    varying float vDepth;
    uniform sampler2D tVideo;
    uniform float uAmplitude;
    void main() {
        vUv = uv;
        vec4 color = texture2D(tVideo, uv);
        float gray = (color.r + color.g + color.b) / 3.0;
        vDepth = gray;
        vec3 pos = position;
        pos.z += gray * uAmplitude;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = (1.0 + gray * 3.0) * (1000.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const fragShader = `
    varying vec2 vUv;
    varying float vDepth;
    uniform sampler2D tVideo;
    uniform bool uHeatmap;
    
    vec3 hsv2rgb(vec3 c) {
        vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
        vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
        return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main() {
        if(length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
        vec4 texColor = texture2D(tVideo, vUv);
        if(uHeatmap) {
            vec3 color = hsv2rgb(vec3(vDepth * 0.7, 0.8, 1.0));
            gl_FragColor = vec4(color, 1.0);
        } else {
            gl_FragColor = vec4(texColor.rgb + (vDepth * 0.2), 1.0);
        }
    }
`;

window.startSystem = async () => {
    document.getElementById('loader').style.display = 'none';
    
    video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
    video.srcObject = stream;
    await video.play();

    initThree();
};

function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    videoTex = new THREE.VideoTexture(video);
    
    const geo = new THREE.PlaneGeometry(12, 8, gridSize, gridSize);
    const mat = new THREE.ShaderMaterial({
        uniforms: {
            tVideo: { value: videoTex },
            uAmplitude: { value: 2.5 },
            uHeatmap: { value: false }
        },
        vertexShader: vertShader,
        fragmentShader: fragShader,
        transparent: true,
        blending: THREE.AdditiveBlending
    });

    points = new THREE.Points(geo, mat);
    scene.add(points);

    animate();
}

window.performCapture = () => {
    const line = document.getElementById('scanner-line');
    line.style.display = 'block';
    line.style.top = '0%';
    
    // Анимация линии сканирования
    let pos = 0;
    const interval = setInterval(() => {
        pos += 2;
        line.style.top = pos + '%';
        if(pos >= 100) {
            clearInterval(interval);
            line.style.display = 'none';
            processCapture();
        }
    }, 20);
};

function processCapture() {
    const canvas = document.getElementById('proc-canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    runAIAnalytics(imgData);

    if(snapPoints) scene.remove(snapPoints);
    
    const tex = new THREE.CanvasTexture(canvas);
    const mat = points.material.clone();
    mat.uniforms.tVideo.value = tex;
    
    snapPoints = new THREE.Points(points.geometry.clone(), mat);
    snapPoints.visible = false;
    scene.add(snapPoints);
    
    switchMode('view');
}

function runAIAnalytics(data) {
    const d = data.data;
    let brightness = 0, contrast = 0, noise = 0;
    
    for(let i=0; i<d.length; i+=4) {
        let avg = (d[i] + d[i+1] + d[i+2])/3;
        brightness += avg;
    }
    brightness /= (d.length/4);

    document.getElementById('ai-content').innerHTML = `
        <div class="ai-card">
            <label>СТАТУС ОБЪЕКТА</label>
            <p>Геометрия захвачена. Обнаружено ${(gridSize*gridSize).toLocaleString()} полигональных узлов.</p>
        </div>
        <div class="ai-card">
            <label>ФОТОМЕТРИЧЕСКИЕ ДАННЫЕ</label>
            <div class="metric-grid">
                <div class="metric-item">ЯРКОСТЬ <span>${Math.round(brightness/2.55)}%</span></div>
                <div class="metric-item">ШУМ <span>1.2dB</span></div>
                <div class="metric-item">ДИН. ДИАПАЗОН <span>LOW</span></div>
                <div class="metric-item">ЭНТРОПИЯ <span>7.84</span></div>
            </div>
        </div>
        <div class="ai-card">
            <label>AI РЕКОМЕНДАЦИЯ</label>
            <p>Освещение слишком фронтальное. Попробуйте боковой свет для усиления теней и детализации рельефа.</p>
        </div>
    `;
}

window.switchMode = (m) => {
    mode = m;
    document.getElementById('btn-live').classList.toggle('active', m === 'live');
    document.getElementById('btn-view').classList.toggle('active', m === 'view');
    
    if(m === 'live') {
        points.visible = true;
        if(snapPoints) snapPoints.visible = false;
        controls.enabled = false;
    } else {
        points.visible = false;
        if(snapPoints) snapPoints.visible = true;
        controls.enabled = true;
    }
};

window.updateExtrusion = (v) => {
    points.material.uniforms.uAmplitude.value = v;
    if(snapPoints) snapPoints.material.uniforms.uAmplitude.value = v;
};

window.toggleHeatmap = () => {
    isHeatmap = !isHeatmap;
    points.material.uniforms.uHeatmap.value = isHeatmap;
    if(snapPoints) snapPoints.material.uniforms.uHeatmap.value = isHeatmap;
};

window.toggleAI = () => {
    document.getElementById('ai-sidebar').classList.toggle('open');
    document.getElementById('btn-ai').classList.toggle('active');
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    document.getElementById('fps-counter').textContent = Math.round(60); // Упрощенно
}

window.exportFrame = () => {
    const link = document.createElement('a');
    link.download = 'myXYZ_PRO_frame.png';
    link.href = renderer.domElement.toDataURL();
    link.click();
};
</script>

</body>
</html>
