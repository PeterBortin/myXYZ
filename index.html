<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Video Stream Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: #000; font-family: 'Courier New', monospace; overflow: hidden; color: #0f0; }
        #container { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { position: absolute; top: 0; left: 0; z-index: 2; }
        
        #ui {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10; gap: 10px; padding: 0 10px;
        }

        .btn {
            padding: 12px 15px; border-radius: 8px; border: 1px solid #0f0;
            background: rgba(0, 40, 0, 0.8); color: #0f0; font-weight: bold;
            pointer-events: auto; text-transform: uppercase; font-size: 10px;
        }

        #recBtn { background: rgba(255, 0, 0, 0.2); border-color: #f00; color: #f00; }
        #recBtn.active { background: #f00; color: #fff; box-shadow: 0 0 15px #f00; animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.5; } }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .stats { position: absolute; top: 20px; left: 20px; z-index: 11; font-size: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #0f0;">3D STREAM v3.0</h1>
        <p style="color: #888; margin: 20px;">Зажмите REC и плавно двигайте камерой.<br>Светотень будет "налипать" в пространстве.</p>
        <button class="btn" onclick="initApp()">Поехали</button>
    </div>

    <div class="stats" id="info">POINTS: 0 | MODE: LIVE</div>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <button id="recBtn" class="btn">REC (Запись)</button>
            <button id="resetBtn" class="btn">Reset (Сброс)</button>
            <button id="viewBtn" class="btn">View Mode</button>
        </div>
    </div>

    <canvas id="procCanvas" style="display:none;"></canvas>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform sampler2D u_tex;
        uniform float u_depthScale;
        varying float v_brightness;
        void main() {
            vec4 color = texture2D(u_tex, uv);
            v_brightness = dot(color.rgb, vec3(0.299, 0.587, 0.114));
            vec3 pos = position;
            pos.z += v_brightness * u_depthScale;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 2.0;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying float v_brightness;
        uniform vec3 u_color;
        void main() {
            if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
            gl_FragColor = vec4(u_color * (0.4 + v_brightness * 0.6), 1.0);
        }
    </script>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, video, videoTexture;
        let liveMesh, recordedMesh;
        let isRecording = false;
        let pointIndex = 0;
        const MAX_POINTS = 150000; // Лимит точек для стабильности
        const DEPTH_SCALE = 1.2;

        window.initApp = async () => {
            document.getElementById('overlay').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            setup();
        };

        function setup() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Сетка для ориентации
            const grid = new THREE.GridHelper(10, 20, 0x003300, 0x001100);
            grid.position.y = -1.5;
            scene.add(grid);

            setupCamera().then(() => {
                createLiveView();
                createStorage();
                setupUI();
                animate();
            });
        }

        async function setupCamera() {
            video = document.getElementById('webcam');
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 480, height: 360 } 
            });
            video.srcObject = stream;
            videoTexture = new THREE.VideoTexture(video);
        }

        function createLiveView() {
            const geo = new THREE.PlaneGeometry(3, 2.2, 128, 128);
            const mat = new THREE.ShaderMaterial({
                uniforms: { u_tex: { value: videoTexture }, u_depthScale: { value: DEPTH_SCALE }, u_color: { value: new THREE.Color(0x00ff00) } },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending
            });
            liveMesh = new THREE.Points(geo, mat);
            scene.add(liveMesh);
        }

        function createStorage() {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(MAX_POINTS * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(MAX_POINTS * 3), 3));
            const mat = new THREE.PointsMaterial({ size: 0.02, vertexColors: true, transparent: true, opacity: 0.7 });
            recordedMesh = new THREE.Points(geo, mat);
            scene.add(recordedMesh);
        }

        function setupUI() {
            const recBtn = document.getElementById('recBtn');
            const resBtn = document.getElementById('resetBtn');
            const viewBtn = document.getElementById('viewBtn');

            recBtn.ontouchstart = () => { isRecording = true; recBtn.classList.add('active'); };
            recBtn.ontouchend = () => { isRecording = false; recBtn.classList.remove('active'); };

            resBtn.onclick = () => {
                // Сброс камеры
                camera.position.set(0, 0, 3);
                controls.target.set(0, 0, 0);
                // Очистка точек
                pointIndex = 0;
                recordedMesh.geometry.attributes.position.array.fill(0);
                recordedMesh.geometry.attributes.position.needsUpdate = true;
                updateStats();
            };

            let viewMode = false;
            viewBtn.onclick = () => {
                viewMode = !viewMode;
                liveMesh.visible = !viewMode;
                viewBtn.innerText = viewMode ? "Back to Scan" : "View Mode";
                document.getElementById('info').innerText = viewMode ? "MODE: VIEWING RECORD" : "MODE: LIVE";
            };
        }

        // Каждую секунду в режиме REC мы берем выборку пикселей и "запекаем" их в 3D
        function recordFrame() {
            if (!isRecording || pointIndex >= MAX_POINTS) return;

            const canvas = document.getElementById('procCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 40; canvas.height = 30; // Маленький размер для скорости
            ctx.drawImage(video, 0, 0, 40, 30);
            const data = ctx.getImageData(0,0,40,30).data;

            const pos = recordedMesh.geometry.attributes.position.array;
            const col = recordedMesh.geometry.attributes.color.array;

            // Матрица трансформации камеры, чтобы точки оставались там, где их "сняли"
            const camPos = camera.position.clone();
            const camRot = camera.quaternion.clone();

            for(let y=0; y<30; y++) {
                for(let x=0; x<40; x++) {
                    const i = (y * 40 + x);
                    const r = data[i*4]/255, g = data[i*4+1]/255, b = data[i*4+2]/255;
                    const bright = (0.299*r + 0.587*g + 0.114*b);

                    // Создаем точку относительно камеры
                    const p = new THREE.Vector3(
                        (x/40 - 0.5) * 3,
                        (0.5 - y/30) * 2.2,
                        bright * DEPTH_SCALE
                    );
                    
                    // Переводим в мировые координаты
                    p.applyQuaternion(camRot);
                    p.add(camPos);

                    const idx = (pointIndex % MAX_POINTS) * 3;
                    pos[idx] = p.x; pos[idx+1] = p.y; pos[idx+2] = p.z;
                    col[idx] = r; col[idx+1] = g; col[idx+2] = b;
                    
                    pointIndex++;
                }
            }
            recordedMesh.geometry.attributes.position.needsUpdate = true;
            recordedMesh.geometry.attributes.color.needsUpdate = true;
            updateStats();
        }

        function updateStats() {
            document.getElementById('info').innerText = `POINTS: ${pointIndex} | MODE: LIVE`;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isRecording) recordFrame();
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
