<!DOCTYPE html>
<html>
<head>
    <title>3D Scanner Prototype</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #0f0; z-index: 10; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        canvas { position: absolute; top: 0; left: 0; }
        button { background: none; border: 1px solid #0f0; color: #0f0; padding: 10px 20px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <div id="ui">
        <div id="counter">Points: 0</div>
        <button id="scanBtn">Сканировать (Зажать)</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Настройка сцены
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Доступ к камере телефона/ноута
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Ошибка камеры:", err));

        // 3. Создание облака точек
        const maxPoints = 10000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(maxPoints * 3);
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.05 });
        const pointCloud = new THREE.Points(geometry, material);
        scene.add(pointCloud);

        let pointIndex = 0;
        let isScanning = false;

        // 4. Функция добавления точки "взгляда"
        function addPoint() {
            if (pointIndex >= maxPoints) return;

            // Имитируем глубину (в реальности тут был бы LiDAR или анализ картинки)
            const distance = 2 + Math.random() * 0.5; 
            const vector = new THREE.Vector3(0, 0, -distance);
            vector.applyQuaternion(camera.quaternion); // Точка летит туда, куда смотрит камера
            vector.add(camera.position);

            const posArray = geometry.attributes.position.array;
            posArray[pointIndex * 3] = vector.x;
            posArray[pointIndex * 3 + 1] = vector.y;
            posArray[pointIndex * 3 + 2] = vector.z;

            pointIndex++;
            geometry.attributes.position.needsUpdate = true;
            document.getElementById('counter').innerText = `Points: ${pointIndex}`;
        }

        // 5. Управление (Гироскоп для мобилок)
        window.addEventListener('deviceorientation', (e) => {
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
            camera.rotation.set(beta, alpha, -gamma, 'YXZ');
        });

        // Кнопка скана
        const btn = document.getElementById('scanBtn');
        btn.onmousedown = btn.ontouchstart = () => isScanning = true;
        window.onmouseup = window.ontouchend = () => isScanning = false;

        function animate() {
            requestAnimationFrame(animate);
            if (isScanning) addPoint();
            renderer.render(scene, camera);
        }
        animate();

        // Ресайз
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
